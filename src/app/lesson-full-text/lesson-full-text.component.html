<section class="p-4 mx-auto mb-2 rounded-lg reading">
  <img class="mx-auto rounded-lg" [src]="coverImage" alt="cover image">
</section>

<section class="flex flex-col flex-wrap p-4 mb-2 rounded-lg reading">
  <div #fullText translate="no" class="max-h-[70vh] overflow-y-auto">
    <div class="flex flex-row flex-wrap items-center justify-around mb-4">
      <h2 class="m-0 font-bold text-center">{{itemDetails()?.title}} </h2>
      <button class="flex justify-center gap-2 button">
        <app-play-button id="play-button" #playButton class="h-5" 
        [textArray]="[textOrUrl]"
        (click)="readAll()"
        > Listen </app-play-button>
      </button>
      <button type="button" class="button" (click)="addToPlaylist()">Add to Playlist</button>
    </div>
    <div id='full-text' class="full-text" [innerHTML]="(itemDetails()?.content || '') | markdown | async"></div>
  </div>
  <p class="mt-2 text-sm">
    Tags:
    {{itemDetails()?.tags}}
  </p>
</section>

<section class="p-4 rounded-lg reading">
  <h2 class="mb-0 text-center">Line-By-Line</h2>
  <p class="mb-0 text-xs text-center">You can use a web browser like Chrome or Edge to provide translations. <a href="https://youtu.be/Jfv9bKDYxvM">(Video)</a></p>
  
  <div class="grid grid-cols-2 gap-1 mb-1">
    <button class="flex justify-center gap-2 mt-2 button" (click)="readAll()">
      <img class="h-5" alt="play-pause button" src="../../assets/icons/headphones.svg"> 
      @if(audioPlaying()) { Playing...}
      @else {Full Text}
    </button>
    <button class="flex justify-center w-full gap-2 mt-2 button" type="button"
      (click)="showTranslation = !showTranslation">Toggle Translations</button>
  </div>
  
  
  <div [innerHTML]="(itemDetails()?.contentLines || '') | markdown | async" (click)="readThis($event)"
    [ngClass]="showTranslation ? 'shown' : 'hide-translations'"></div>
</section>
