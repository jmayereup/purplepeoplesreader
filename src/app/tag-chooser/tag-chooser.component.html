  <div class="flex pb-3 mx-auto my-2 overflow-x-scroll">
    @for (tag of tags; track $index) {
      <a [routerLink]="['/list']" [queryParams]="{tag: tag}" class="mr-[2px] m-0">
          <button class="text-white bg-blue-500 pills border-blue focus:bg-blue-600 hover:bg-blue-600 ">{{tag}}</button>
      </a>
    }
  </div>
