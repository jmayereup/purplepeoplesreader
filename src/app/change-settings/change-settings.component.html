    <form [formGroup]="form">
        <div class="bg-inherit rounded-lg p-2 grid grid-cols-1 md:grid-cols-2 gap-2 my-2">
            <div>
                <label class="form-label" for="voices">Voice</label>
                <select id="voices" class="form-input" #language title="select a TTS Voice" name="selectedLanguage" formControlName="selectedLanguage">
                    <option value=default selected>Default</option>
                    <option value="ar-SA">Arabic</option>
                    <option value="zh-CN">Chinese</option>
                    <option value="nl-NL">Dutch</option>
                    <option value="en-CA">English</option>
                    <option value="en-US">English 2</option>
                    <option value="fil-PH">Filipino</option>
                    <option value="fr-FR">French</option>
                    <option value="fr-CA">French 2</option>
                    <option value="de-DE">German</option>
                    <option value="de-AT">German 2</option>
                    <option value="hi-IN">Hindi</option>
                    <option value="it-IT">Italian</option>
                    <option value="ja-JP">Japanese</option>
                    <option value="ko-KR">Korean</option>
                    <option value="pt-PT">Portuguese</option>
                    <option value="ru-RU">Russian</option>
                    <option value="es-ES">Spanish (Spain)</option>
                    <option value="es-MX">Spanish (Mexico)</option>
                    <option value="es-AR">Spanish 3</option>
                    <option value="th-TH">Thai</option>
                    <option value="uk-UA">Ukrainian</option>
                </select>
            </div>

            <div>
                <label for="speed" class="form-label">Voice Speed:</label>
                <div #rate id="speed" class="form-input" translate="yes">
                    <div class="flex flex-row justify-around align-middle">
                        <span>
                            <label>
                                <input type="radio" name="rate" formControlName="rate" [value]=0.7 /> Slow
                            </label>
                        </span>
                        <span>
                            <label>
                                <input type="radio" name="rate" formControlName="rate" [value]=1 /> Normal
                            </label>
                        </span>
                        <span>
                            <label>
                                <input type="radio" name="rate" formControlName="rate" [value]=1.3 /> Fast
                            </label>
                        </span>
                    </div>
                </div>
            </div>
            <!-- <div class="grid-box select">
                <select formControlName="theme" name="theme" title="Color Theme">
                    <option value='white'>White</option>
                    <option value='yellow'>Yellow</option>
                    <option value='black'>Black</option>
                    <option value='green'>Green</option>
                    <option value='blue'>Blue</option>
                    <option value='default'>Default</option>
                </select>
                <label class="main-label" for="theme">Theme</label>
            </div> -->
            <div>
                <label class="form-label" for="fsize">Font Size</label>
                <select id="fsize" class="form-input" formControlName="fsize" name="fsize" title="Color Theme">
                    <option value='small'>XS</option>
                    <option value='medium'>Small</option>
                    <option value='large'>Medium</option>
                    <option value='larger'>Large</option>
                    <option value='x-large'>XL</option>
                    <option value='xx-large'>XXL</option>
                </select>
            </div>
            <div>
                <app-change-language></app-change-language>
            </div>
        </div>
    </form>
