<section class="bg-white dark:bg-gray-900">
    <div class="container px-6 py-10 mx-auto ">
        <app-welcome></app-welcome>
        <h1 class="text-center text-2xl font-semibold">
            Choose Your Level
        </h1>

        <p class="text-center mt-4 dark:bg-gray-700">
            You can also create your own lessons with text from the internet.</p>
        <div class="grid grid-cols-1 gap-8 mt-8 xl:mt-12 xl:gap-12 md:grid-cols-3">
            <div class="w-full grid" [routerLink]="['/list']" [queryParams]="{tag: 'A1'}">
                <div class="img-container bg-green-200">
                    <img src="../../assets/easy.svg" class="img-svg" alt="easy level">
                </div>
                    <p class="image-caption">A1 - Short texts with easy vocabulary.</p>
            </div>

            <div class="w-full grid" [routerLink]="['/list']" [queryParams]="{tag: 'A2'}">

                <div class="img-container bg-yellow-200">
                    <img src="../../assets/medium.svg" class="img-svg" alt="easy level">
                </div>
                <div>

                    <p class="image-caption">A2 - Texts with more difficulty vocabulary.</p>
                </div>
            </div>

            <div class="w-full grid" [routerLink]="['/list']" [queryParams]="{tag: 'B1'}">
                <div class="img-container bg-red-200">
                    <img src="../../assets/hard.svg" class="img-svg" alt="easy level">
                </div>

                <p class="image-caption">B1 - Longer texts with more advanced vocabulary or grammar.</p>
            </div>
        </div>
    </div>
</section>
