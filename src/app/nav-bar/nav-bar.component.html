<nav class="max-w-screen-md mx-auto shadow primary md:rounded-t-lg">
    <div class="flex items-center justify-between mx-2 h-14">
        <!-- Mobile menu button -->
        <div class="flex flex-row items-center">
            <button (click)="isOpen = !isOpen" type="button" class="nav-link focus:outline-none "
                aria-label="toggle menu">
                @if(!isOpen) {
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 8h16M4 16h16" />
                </svg>
                } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
                }
            </button>
            <div class="flex">
                <a class="text-lg nav-link" [routerLink]="['']" queryParamsHandling="preserve">
                    <p>The Purple People's Reader</p>
                </a>
            </div>
        </div>
        <div class="flex justify-between">

            <div class="items-center hidden text-sm md:flex">
                <a class="nav-link" [routerLink]="['/list']" [queryParams]="{tag: 'A1', lang: lang() }">
                    <p>Lessons</p>
                </a>
                <a class="nav-link" [routerLink]="['/list/user']" [queryParams]="{tag: 'user'}">
                    <p>My Lessons</p>
                </a>
                <a class="nav-link" [routerLink]="['/playlist']">
                    <p>Playlist</p>
                </a>
                @if(this.store.user.userId()){
                    <a class="nav-link" [routerLink]="['/new']" [queryParams]="{edit:'true', reset:'true'}"
                        queryParamsHandling="merge">
                        <p>CREATE</p>
                    </a>
                } @else {
                    <a class="nav-link" [routerLink]="['/register']">
                        <p>LOGIN</p>
                    </a>
                }
            </div>

        </div>
    </div>
    <!-- Mobile Menu open: "block", Menu closed: "hidden" -->
    <div [ngClass]="isOpen ? 'opened' : 'closed'"
        class="absolute inset-x-0 z-20 w-full max-w-screen-md px-6 py-2 mx-auto transition-all duration-300 ease-in-out menu ">
        <div class="flex flex-col -mx-6" (click)="isOpen = !isOpen">
            <a [routerLink]="['/list']" [queryParams]="{tag: tag(), lang: lang() }" class="nav-link">LESSONS</a>
            <a [routerLink]="['/list/user']" [queryParams]="{tag: 'user'}" class="nav-link">MY LESSONS</a>
            <a [routerLink]="['/playlist']" class="nav-link">PLAYLIST</a>
            <a [routerLink]="['/new']" [queryParams]="{edit:'true', reset:'true'}" queryParamsHandling="merge" class="nav-link">CREATE NEW</a>
            <a [routerLink]="['/register']" class="nav-link">Register or Login</a>
            @if(this.store.user.userEmail() === "admin@teacherjake.com") {<a [routerLink]="['/routes']" class="nav-link">ROUTES</a>}
                <div class="flex items-center mt-2 ml-4 lg:mt-0">
                    @if(username) {
                    <div class="w-8 h-8 overflow-hidden border-2 border-gray-400 rounded-full">
                        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=334&q=80"
                            class="object-cover w-full h-full" alt="avatar">
                    </div>
        
                    <p class="pl-3"> {{username}}</p>
                    }
                </div>
        </div>

    </div>
</nav>
