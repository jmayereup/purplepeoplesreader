<nav class="max-w-screen-md mx-auto primary shadow  md:rounded-t-lg">
    <div class="flex items-center h-14 justify-between mx-2">
            <!-- Mobile menu button -->
            <div class="flex flex-row items-center">
                <button (click)="isOpen = !isOpen" type="button" class="nav-link focus:outline-none "
                    aria-label="toggle menu">
                    @if(!isOpen) {
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 8h16M4 16h16" />
                    </svg>
                    } @else {
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    }
                </button>
                <div class="flex">
                    <a class="nav-link text-lg" [routerLink]="['/intro']" queryParamsHandling="preserve">
                        <p>The Purple People's Reader</p>
                    </a>
                </div>
            </div>
            <div class="flex justify-between">

                <div class="items-center hidden sm:flex">
                    <a class="nav-link" [routerLink]="['']">
                        <p>Home</p>
                    </a>
                    <a class="nav-link" [routerLink]="['/list']" queryParamsHandling="preserve">
                        <p>Lessons</p>
                    </a>
                    <a class="nav-link" [routerLink]="['/list/user']" [queryParams]="{tag: 'user'}">
                        <p>My Lessons</p>
                    </a>
                    <a class="nav-link" [routerLink]="['/new']" [queryParams]="{edit:'true'}"
                        queryParamsHandling="merge">
                        <p>CREATE</p>
                    </a>
                </div>

            </div>
        </div>
        <!-- Mobile Menu open: "block", Menu closed: "hidden" -->
        <div [ngClass]="isOpen ? 'opened' : 'closed'"
            class="menu max-w-screen-md absolute inset-x-0 mx-auto z-20 w-full px-6 py-2 transition-all duration-300 ease-in-out ">
            <div class="flex flex-col -mx-6" (click)="isOpen = !isOpen">
                <a [routerLink]="['']" class="nav-link">HOME</a>
                <a [routerLink]="['/list']" queryParamsHandling="preserve" class="nav-link">LESSONS</a>
                <a [routerLink]="['/list/user']" [queryParams]="{tag: 'user'}" class="nav-link">MY LESSONS</a>
                <a [routerLink]="['/new']" [queryParams]="{edit:'true'}" queryParamsHandling="merge"
                    class="nav-link">CREATE NEW</a>
            </div>

            <div class="flex items-center mt-4 lg:mt-0">
                <button
                    class="hidden mx-4 transition-colors duration-300 transform lg:block dark:text-gray-200 hover:text-gray-700 dark:hover:text-gray-400 focus:text-gray-700 dark:focus:text-gray-400 focus:outline-none"
                    aria-label="show notifications">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M15 17H20L18.5951 15.5951C18.2141 15.2141 18 14.6973 18 14.1585V11C18 8.38757 16.3304 6.16509 14 5.34142V5C14 3.89543 13.1046 3 12 3C10.8954 3 10 3.89543 10 5V5.34142C7.66962 6.16509 6 8.38757 6 11V14.1585C6 14.6973 5.78595 15.2141 5.40493 15.5951L4 17H9M15 17V18C15 19.6569 13.6569 21 12 21C10.3431 21 9 19.6569 9 18V17M15 17H9"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>

                <button type="button" class="flex items-center focus:outline-none" aria-label="toggle profile dropdown">
                    <div class="w-8 h-8 overflow-hidden border-2 border-gray-400 rounded-full">
                        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=crop&w=334&q=80"
                            class="object-cover w-full h-full" alt="avatar">
                    </div>

                    <h3 class="mx-2 lg:hidden">{{username}}</h3>
                </button>
            </div>
        </div>
</nav>
