<div class="flex flex-col max-w-screen-md px-2 mx-auto overflow-x-visible">
    @if (type != 'user') {
        <app-tag-chooser class=""></app-tag-chooser>
    }
    <!-- <div class="flex items-center gap-x-3">
        <h2 class="text-lg font-medium text-gray-800 dark:text-white">Lessons</h2>

        <span
            class="px-3 py-1 text-xs text-blue-600 bg-blue-100 rounded-full dark:bg-gray-800 dark:text-blue-400">100</span>
    </div> -->

    <div class="flex flex-col">
        <!-- <div class="-mx-4 -my-2 overflow-x-auto sm:-mx-6 lg:-mx-8"> -->
        <div class="p-4 pt-0">
            <div class="flex py-2 align-middle md:px-6 lg:px-8">
                <div class="mx-auto overflow-x-auto border border-gray-200 dark:border-gray-700 md:rounded-lg">
                    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
                        <thead class="bg-gray-50 dark:bg-gray-800">
                            <tr>
                                <th scope="col"
                                    class="py-3.5 px-4 text-sm font-normal text-left rtl:text-right text-gray-500 dark:text-gray-400">
                                    <div class="flex items-center gap-x-3">
                                        <input type="checkbox"
                                            class="text-blue-500 border-gray-300 rounded dark:bg-gray-900 dark:ring-offset-gray-900 dark:border-gray-700">
                                    </div>
                                </th>
                                <th scope="col"
                                    class="py-3.5 px-4 text-sm font-normal text-left rtl:text-right text-black dark:text-gray-400">
                                    <div class="flex items-center gap-x-3">
                                        <span>Title</span>
                                    </div>
                                </th>

                                <th scope="col"
                                    class="px-4 py-3.5 text-sm font-normal text-left rtl:text-right text-gray-500 dark:text-gray-400">
                                    <button class="flex items-center gap-x-2 clear">
                                        <span>Tags</span>

                                        <img class="h-3" fill="none" src="../../assets/icons/sort-up.svg">
                                    </button>
                                </th>

                                <th scope="col"
                                    class="px-4 py-3.5 text-sm font-normal text-left rtl:text-right text-gray-500 dark:text-gray-400">
                                    <button class="flex items-center gap-x-2 clear">
                                        <span>Actions</span>
                                    </button>
                                </th>



                                <th scope="col" class="relative py-3.5 px-4">
                                    <span class="sr-only">Edit</span>
                                </th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200 dark:divide-gray-700 dark:bg-gray-900">
                            @if (resultList()) {

                            @for (item of resultList(); track item.id) {


                            <tr>
                                <td class="px-3.5 py-4 text-sm font-medium text-gray-700 whitespace-nowrap">
                                    <div class="flex items-center gap-x-3">
                                        <input type="checkbox"
                                            class="text-blue-500 border-gray-300 rounded dark:bg-gray-900 dark:ring-offset-gray-900 dark:border-gray-700">
                                    </div>
                                </td>
                                <td class="py-4 pl-2 pr-6 text-sm font-medium text-gray-700 whitespace-nowrap">
                                    <div class="flex items-center gap-x-1" [routerLink]="['/lesson', item.id]"
                                        queryParamsHandling="preserve">
                                        <img class="object-cover w-10 rounded-md max-h-40" [src]="defaultImage" alt="">
                                        <div>
                                            <h2 class="font-medium text-gray-800 dark:text-white ">{{item.title}}</h2>
                                            <p class="text-sm font-normal text-gray-600 overflow-clip dark:text-gray-400"
                                                [innerHTML]="item.content.slice(0,50)">
                                            </p>

                                        </div>
                                    </div>
                                </td>
                                <td class="p-0 py-4 pl-6 text-sm font-medium text-gray-700 whitespace-nowrap">
                                    <div
                                        class="inline-flex items-center px-3 py-1 rounded-full gap-x-2 bg-emerald-100/60 dark:bg-gray-800">
                                        <h2 class="text-sm font-normal text-black break-before-auto">{{item.tags}}</h2>
                                    </div>
                                </td>
                                <td class="px-1 py-4 text-sm whitespace-nowrap">
                                    <div class="flex items-center gap-x-1">
                                        <!-- Trash Can -->
                                        <button (click)="deleteLesson(item)"
                                            class="text-gray-500 transition-colors duration-200 dark:hover:text-red-500 dark:text-gray-300 hover:text-red-500 focus:outline-none clear"><img src="../../assets/icons/trash.svg" alt="trash icon"  class="w-5 h-5" />

                                        </button>
                                        <!-- Edit Icon -->
                                            <button (click)="editLesson(item)"
                                                class="text-gray-500 transition-colors duration-200 dark:hover:text-yellow-500 dark:text-gray-300 hover:text-yellow-500 focus:outline-none clear"><img src="../../assets/icons/edit.svg" alt="edit icon"  class="w-5 h-5" />
                                            </button>
                                    </div>
                                </td>
                            </tr>
                            }
                            }
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="flex items-center justify-between mt-6">
        <a href="#"
            class="flex items-center px-5 py-2 text-sm text-gray-700 capitalize transition-colors duration-200 bg-white border rounded-md gap-x-2 hover:bg-gray-100 dark:bg-gray-900 dark:text-gray-200 dark:border-gray-700 dark:hover:bg-gray-800">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 rtl:-scale-x-100">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 15.75L3 12m0 0l3.75-3.75M3 12h18" />
            </svg>

            <span>
                previous
            </span>
        </a>

        <div class="items-center hidden lg:flex gap-x-3">
            <a href="#" class="px-2 py-1 text-sm text-blue-500 rounded-md dark:bg-gray-800 bg-blue-100/60">1</a>
            <a href="#"
                class="px-2 py-1 text-sm text-gray-500 rounded-md dark:hover:bg-gray-800 dark:text-gray-300 hover:bg-gray-100">2</a>
            <a href="#"
                class="px-2 py-1 text-sm text-gray-500 rounded-md dark:hover:bg-gray-800 dark:text-gray-300 hover:bg-gray-100">3</a>
            <a href="#"
                class="px-2 py-1 text-sm text-gray-500 rounded-md dark:hover:bg-gray-800 dark:text-gray-300 hover:bg-gray-100">...</a>
            <a href="#"
                class="px-2 py-1 text-sm text-gray-500 rounded-md dark:hover:bg-gray-800 dark:text-gray-300 hover:bg-gray-100">12</a>
            <a href="#"
                class="px-2 py-1 text-sm text-gray-500 rounded-md dark:hover:bg-gray-800 dark:text-gray-300 hover:bg-gray-100">13</a>
            <a href="#"
                class="px-2 py-1 text-sm text-gray-500 rounded-md dark:hover:bg-gray-800 dark:text-gray-300 hover:bg-gray-100">14</a>
        </div>

        <a href="#"
            class="flex items-center px-5 py-2 text-sm text-gray-700 capitalize transition-colors duration-200 bg-white border rounded-md gap-x-2 hover:bg-gray-100 dark:bg-gray-900 dark:text-gray-200 dark:border-gray-700 dark:hover:bg-gray-800">
            <span>
                Next
            </span>

            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-5 h-5 rtl:-scale-x-100">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 8.25L21 12m0 0l-3.75 3.75M21 12H3" />
            </svg>
        </a>
    </div>
</div>
