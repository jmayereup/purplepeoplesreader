<section class="flex flex-col max-w-screen-md w-full mx-auto overflow-x-visible">
    @if (type != 'user') {
    <app-lang-chooser></app-lang-chooser>
    <app-tag-chooser class=""></app-tag-chooser>
    }
    <div class="grid grid-cols-1 sm:grid-cols-2 px-2 my-2 gap-1">
        @if (resultList()) {
        @for (item of resultList(); track item.id) {
        <div class="flex flex-row flex-nowrap items-center justify-between gap-2 shadow-md rounded-md bg-lbl-purple-200 p-2"
            [routerLink]="['/', item.language, item.id]">
            <img class="object-cover w-12 h-12 rounded-md" [src]="item.imageUrl || defaultImage" alt="">
            <div class="">
                <h2 class="font-semibold text-sm text-gray-800 dark:text-white p-0 m-0">
                    {{item.title.slice(0,36)}}</h2>
                <p class="text-sm ">{{item.content.slice(0,36)}}</p>
            </div>
            <button (click)="deleteLesson(item)"
                class="text-gray-500 w-5 h-5 p-0 transition-colors duration-200 dark:hover:text-red-500 dark:text-gray-300 hover:text-red-500 focus:outline-none clear"><img
                    src="../../assets/icons/trash.svg" alt="trash icon" class="w-5 h-5" />
            </button>
        </div>
        }
        }
    </div>
    <app-lesson-level-chooser></app-lesson-level-chooser>
</section>
