<div class="p-4">
    <h1 class="text-2xl font-bold">Playlist</h1>
    <p>It is helpful listen to your lessons several times after reading them.</p>
    <div class="flex flex-row justify-center mb-2 align-middle"><app-play-button #playButton class="button"
            (click)="playButton.readById(textOrUrlArray || ['no file selected'])">Listen</app-play-button></div>
    @for (lesson of playlist(); track $index) {
    <div class="flex flex-row items-center gap-4 mb-1">
        <input type="checkbox" class="check-box" (change)="toggleLesson(lesson.id, $event)">
        <a [routerLink]="['/', lesson.language, lesson.id]">{{lesson.title}} - {{lesson.points}}</a>
        <button (click)="removeLesson(lesson.id)"
            class="w-5 h-5 p-0 text-gray-800 transition-colors duration-200 bg-white dark:hover:text-red-500 dark:text-gray-300 hover:text-red-500 focus:outline-none clear"><img
                src="../../assets/icons/trash.svg" alt="trash icon" class="w-5 h-5" />
        </button>
    </div>
    }
</div>
