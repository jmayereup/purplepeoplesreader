<form [formGroup]="form" class="flex flex-wrap">
    <div class="w-full">
        <label for="image" class="block text-sm text-gray-500 dark:text-gray-300">Image</label>
        <input type="file" id="file" formControlName="file" (change)="onFileSelected($event)" class="file-input"
            #fileUpload>
    </div>
    @if (errorMessage) {
    <div class="warning">
        <br>
        There was an error uploading the file.
    </div>
    }
    @if (successMessage) {
    {{successMessage}} 👍
    <p>{{fileName}}</p>
    }
    @if (loading) { <p>Please Wait...</p> }
</form>
